name: Build CV PDF

on:
  push:
    branches: [ "master" ]
    paths:
      - "files/cv.tex"
      - "files/resume.cls"
      - ".github/workflows/build-cv-pdf.yml"

permissions:
  contents: write

jobs:
  build-and-commit:
    # Avoid infinite loop when this workflow pushes the generated PDF.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile CV (latexmk)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: files
          root_file: cv.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Update PDF in repo
        run: |
          set -euo pipefail
          cd files
          if [ ! -f cv.pdf ]; then
            echo "cv.pdf not found after build"
            exit 1
          fi
          mv -f cv.pdf Fahimeh_Orvati_Nia_CV.pdf

      - name: Commit and push PDF (if changed)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add files/Fahimeh_Orvati_Nia_CV.pdf

          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
            exit 0
          fi

          git commit -m "Update CV PDF"
          git push

