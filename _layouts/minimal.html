---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      .masthead {
        display: none !important;
      }
      .sidebar {
        display: none !important;
      }
      .page__footer {
        margin-top: 60px;
        padding-top: 20px;
        border-top: 1px solid #e0e0e0;
        text-align: center;
        font-size: 0.9em;
        color: #666;
      }
      h1, h2 {
        margin-top: 30px;
        margin-bottom: 15px;
      }
      h2 {
        font-size: 1.5em;
        border-bottom: 1px solid #e0e0e0;
        padding-bottom: 10px;
      }
      a {
        color: #0066cc;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    {{ content }}

    <div class="page__footer">
      <footer>
        <p>&copy; {{ "now" | date: "%Y" }} {{ site.name | default: site.title }}</p>
      </footer>
    </div>
  </body>
</html>
